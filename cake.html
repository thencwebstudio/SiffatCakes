<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Customize Cake - Siffat Cakes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#fbf4fb;
      --text:#1d141f;
      --muted:#725a76;
      --purple:#640D6B;
      --purple2:#7a1281;
      --soft:#fff7ff;
      --line:rgba(100,13,107,.16);
      --shadow:0 18px 45px rgba(100,13,107,.12);
      --shadow2:0 10px 24px rgba(100,13,107,.09);
      --green:#16823a;
      --red:#b42318;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      width:100%;
      min-height:100%;
      scroll-behavior:smooth;
      background:var(--bg);
    }

    body{
      width:100%;
      min-height:100vh;
      background:
        radial-gradient(circle at 0% 0%, rgba(100,13,107,.11), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(122,18,129,.09), transparent 28%),
        linear-gradient(180deg,var(--bg),#ffffff 54%,#ffffff);
      color:var(--text);
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    button{border:none;cursor:pointer;background:none}
    img{max-width:100%;display:block}

    .wrap{
      width:min(1280px, calc(100% - 32px));
      margin:auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:80;
      background:rgba(255,255,255,.90);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--line);
    }

    .nav{
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .logo{
      width:42px;
      height:42px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      color:#fff;
      box-shadow:0 12px 28px rgba(100,13,107,.22);
      font-size:20px;
      overflow:hidden;
      flex:0 0 auto;
      border:2px solid rgba(255,255,255,.85);
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#fff;
    }

    .brand h1{
      font-size:18px;
      line-height:1;
      letter-spacing:-.045em;
      color:var(--purple);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:260px;
    }

    .brand p{
      margin-top:4px;
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:280px;
      font-weight:750;
    }

    .navActions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      min-width:0;
    }

    .navLink{
      padding:9px 11px;
      border:1px solid transparent;
      color:var(--muted);
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      transition:.18s ease;
      white-space:nowrap;
    }

    .navLink:hover{
      color:var(--purple);
      background:rgba(100,13,107,.07);
      border-color:rgba(100,13,107,.12);
    }

    .primaryBtn,.ghostBtn,.cartBtn,.secondaryBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-radius:999px;
      font-weight:1000;
      transition:.18s ease;
      white-space:nowrap;
    }

    .primaryBtn{
      min-height:40px;
      padding:11px 15px;
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      color:#fff;
      box-shadow:0 12px 28px rgba(100,13,107,.22);
    }

    .primaryBtn:hover{
      transform:translateY(-1px);
      box-shadow:0 16px 34px rgba(100,13,107,.29);
    }

    .ghostBtn{
      min-height:40px;
      padding:10px 13px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--purple);
      box-shadow:0 8px 18px rgba(100,13,107,.05);
    }

    .ghostBtn:hover{
      background:#fff7ff;
      transform:translateY(-1px);
    }

    .cartBtn{
      min-height:40px;
      padding:10px 12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--purple);
      font-size:13px;
      box-shadow:0 8px 18px rgba(100,13,107,.05);
    }

    .cartCount{
      min-width:20px;
      height:20px;
      padding:0 6px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:var(--purple);
      color:#fff;
      font-size:11px;
      font-weight:1000;
    }

    .navSvg{
      width:18px;
      height:18px;
      fill:none;
      stroke:currentColor;
      stroke-width:2.25;
      stroke-linecap:round;
      stroke-linejoin:round;
      flex:0 0 auto;
    }

    .mobileMenuBtn{display:none}

    .mobileMenu{
      display:none;
      border-top:1px solid var(--line);
      padding:10px 0 12px;
      background:rgba(255,255,255,.92);
    }

    .mobileMenu.show{
      display:grid;
      gap:8px;
    }

    .mobileMenu a{
      padding:11px 12px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:900;
      font-size:13px;
      color:var(--purple);
      box-shadow:0 8px 16px rgba(100,13,107,.04);
    }

    .page{
      padding:16px 0 32px;
    }

    .detailGrid{
      display:grid;
      grid-template-columns:.9fr 1.1fr 370px;
      gap:14px;
      align-items:start;
    }

    .imageCard,.formCard,.priceCard,.infoCard{
      border:1px solid var(--line);
      background:rgba(255,255,255,.92);
      border-radius:28px;
      box-shadow:var(--shadow2);
      overflow:hidden;
      min-width:0;
    }

    .imageCard{
      position:sticky;
      top:82px;
    }

    .imageBox{
      height:480px;
      background:#f1e4f2;
      position:relative;
      overflow:hidden;
    }

    .imageBox img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .badge{
      position:absolute;
      left:14px;
      top:14px;
      max-width:calc(100% - 28px);
      padding:8px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.90);
      backdrop-filter:blur(10px);
      color:var(--purple);
      font-size:12px;
      font-weight:1000;
      border:1px solid rgba(100,13,107,.13);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .imageInfo{
      padding:15px;
    }

    .imageInfo h2{
      color:var(--purple);
      font-size:30px;
      letter-spacing:-.06em;
      line-height:1;
      margin-bottom:8px;
    }

    .imageInfo p{
      color:var(--muted);
      line-height:1.55;
      font-size:13px;
      font-weight:650;
    }

    .tags{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .tag{
      padding:6px 8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff7ff;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }

    .cardHead{
      padding:15px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .cardHead h3{
      color:var(--purple);
      font-size:20px;
      letter-spacing:-.05em;
      line-height:1.05;
    }

    .cardHead p{
      margin-top:5px;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      font-weight:650;
    }

    .cardBody{
      padding:15px;
    }

    .formGrid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:11px;
    }

    .formStep{
      grid-column:1/-1;
      margin:2px 0 -2px;
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--purple);
      font-size:12px;
      font-weight:1000;
    }

    .formStep span{
      width:24px;
      height:24px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      color:#fff;
      font-size:11px;
      box-shadow:0 8px 18px rgba(100,13,107,.16);
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .field.full{
      grid-column:1/-1;
    }

    .field label{
      color:var(--purple);
      font-size:12px;
      font-weight:1000;
    }

    .field input,
    .field select,
    .field textarea{
      width:100%;
      border:1px solid var(--line);
      outline:none;
      background:#fff;
      color:var(--text);
      border-radius:15px;
      padding:12px;
      min-height:45px;
      resize:vertical;
      box-shadow:0 8px 18px rgba(100,13,107,.035);
    }

    .field textarea{
      min-height:96px;
    }

    .hint{
      color:var(--muted);
      font-size:11px;
      line-height:1.45;
      font-weight:650;
    }

    .addonsGrid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:8px;
    }

    .addonChoice{
      border:1px solid var(--line);
      background:#fff7ff;
      border-radius:15px;
      padding:10px;
      display:grid;
      grid-template-columns:22px 1fr;
      align-items:flex-start;
      gap:8px;
      cursor:pointer;
      transition:.18s ease;
      min-width:0;
    }

    .addonChoice:hover{
      border-color:rgba(100,13,107,.28);
      transform:translateY(-1px);
    }

    .addonChoice input[type="checkbox"]{
      appearance:auto;
      width:18px !important;
      height:18px !important;
      min-height:18px !important;
      padding:0 !important;
      margin:1px 0 0 !important;
      border-radius:5px !important;
      box-shadow:none !important;
      flex:0 0 auto;
      accent-color:var(--purple);
    }

    .addonChoice div{
      min-width:0;
    }

    .addonChoice b{
      display:block;
      color:var(--text);
      font-size:12px;
      line-height:1.25;
      margin-bottom:3px;
      word-break:break-word;
    }

    .addonChoice span{
      display:block;
      color:var(--muted);
      font-size:11px;
      line-height:1.35;
      word-break:break-word;
    }

    .sideStack{
      display:grid;
      gap:12px;
      position:sticky;
      top:82px;
      min-width:0;
    }

    .priceDetailsToggle{
      display:none;
      width:100%;
      margin-bottom:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--purple);
      font-weight:1000;
      font-size:12px;
    }

    .priceLine{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid var(--line);
      font-size:13px;
      color:var(--muted);
    }

    .priceLine b{
      color:var(--text);
      text-align:right;
    }

    .totalBox{
      margin-top:12px;
      border:1px solid rgba(100,13,107,.18);
      background:#fff7ff;
      border-radius:20px;
      padding:14px;
    }

    .totalBox span{
      display:block;
      color:var(--purple);
      font-size:12px;
      font-weight:1000;
      margin-bottom:5px;
    }

    .totalBox b{
      display:block;
      color:var(--purple);
      font-size:34px;
      letter-spacing:-.06em;
    }

    .quoteNote{
      margin-top:10px;
      border:1px solid rgba(100,13,107,.20);
      background:rgba(100,13,107,.08);
      color:var(--purple);
      border-radius:16px;
      padding:11px;
      font-size:12px;
      font-weight:850;
      line-height:1.45;
      display:none;
    }

    .quoteNote.show{
      display:block;
    }

    .policyNote{
      border:1px solid rgba(100,13,107,.16);
      background:#fff7ff;
      color:var(--muted);
      border-radius:18px;
      padding:12px;
      font-size:12px;
      font-weight:800;
      line-height:1.45;
    }

    .actionRow{
      display:grid;
      grid-template-columns:1fr;
      gap:9px;
      margin-top:12px;
    }

    .addBtn{
      width:100%;
      min-height:46px;
      padding:14px 16px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      color:#fff;
      font-weight:1000;
      box-shadow:0 15px 30px rgba(100,13,107,.22);
    }

    .addBtn:hover{
      transform:translateY(-1px);
    }

    .secondaryBtn{
      width:100%;
      min-height:44px;
      padding:13px 16px;
      border-radius:999px;
      background:#fff;
      color:var(--purple);
      font-weight:900;
      border:1px solid var(--line);
      text-align:center;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      pointer-events:none;
      z-index:200;
      max-width:min(560px,calc(100% - 24px));
      background:var(--purple);
      color:#fff;
      border-radius:999px;
      padding:12px 15px;
      font-size:13px;
      font-weight:1000;
      box-shadow:0 18px 36px rgba(100,13,107,.24);
      transition:.2s ease;
      text-align:center;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .empty{
      border:1px dashed rgba(100,13,107,.22);
      background:rgba(255,255,255,.78);
      border-radius:24px;
      padding:34px 18px;
      color:var(--muted);
      text-align:center;
      line-height:1.55;
      grid-column:1/-1;
      box-shadow:var(--shadow2);
      font-weight:750;
    }

    .empty strong{
      color:var(--purple);
      font-size:20px;
    }

    .mobileStickyBar{
      display:none;
    }

    .footer{
      border-top:1px solid var(--line);
      background:rgba(255,255,255,.72);
      padding:18px 0;
      color:var(--muted);
      font-size:12px;
    }

    .footerInner{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .footerBrand{
      color:var(--purple);
      font-weight:1000;
      font-size:13px;
    }

    .footerSmall{
      display:block;
      margin-top:4px;
      line-height:1.45;
      font-weight:650;
    }

    .footerLinks{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .footerLinks a{
      color:var(--purple);
      font-weight:900;
    }

    @media(max-width:1180px){
      .detailGrid{
        grid-template-columns:1fr 1fr;
      }

      .sideStack{
        grid-column:1/-1;
        position:static;
        grid-template-columns:1fr 1fr;
      }

      .imageCard{
        position:static;
      }

      .imageBox{
        height:430px;
      }
    }

    @media(max-width:860px){
      .detailGrid{
        grid-template-columns:1fr;
      }

      .sideStack{
        grid-template-columns:1fr;
      }

      .imageBox{
        height:390px;
      }
    }

    @media(max-width:720px){
      body{
        background:
          radial-gradient(circle at 0% 0%, rgba(100,13,107,.08), transparent 26%),
          linear-gradient(180deg,#fff8ff,#fff 40%,#fff);
        padding-bottom:92px;
      }

      .wrap{
        width:min(100% - 18px,1280px);
      }

      .topbar{
        background:rgba(255,255,255,.94);
        box-shadow:0 10px 28px rgba(100,13,107,.07);
      }

      .nav{
        min-height:54px;
        gap:8px;
      }

      .logo{
        width:36px;
        height:36px;
        font-size:18px;
        box-shadow:0 8px 18px rgba(100,13,107,.16);
      }

      .brand{
        gap:8px;
      }

      .brand p{
        display:none;
      }

      .brand h1{
        font-size:16px;
        max-width:145px;
        letter-spacing:-.035em;
      }

      .navActions{
        gap:6px;
      }

      .navLink{
        display:none;
      }

      .mobileMenuBtn{
        display:inline-flex;
      }

      .cartBtn,
      .mobileMenuBtn{
        min-height:36px;
        padding:8px 10px;
        font-size:0;
        border-radius:999px;
        background:rgba(255,255,255,.88);
        border-color:rgba(100,13,107,.14);
        box-shadow:0 8px 18px rgba(100,13,107,.07);
      }

      .cartBtn{
        min-width:58px;
        gap:5px;
      }

      .cartBtn .navSvg,
      .mobileMenuBtn .navSvg{
        width:17px;
        height:17px;
      }

      .cartCount{
        min-width:20px;
        height:20px;
        font-size:10px;
        background:linear-gradient(135deg,var(--purple),var(--purple2));
      }

      #topWhatsappBtn{
        min-height:36px;
        padding:0 12px;
        font-size:12px;
        box-shadow:0 10px 22px rgba(100,13,107,.20);
      }

      .page{
        padding:10px 0 18px;
      }

      .detailGrid{
        gap:10px;
      }

      .imageCard,.formCard,.priceCard,.infoCard{
        border-radius:20px;
        box-shadow:0 8px 18px rgba(100,13,107,.07);
      }

      .imageBox{
        height:205px;
      }

      .badge{
        top:9px;
        left:9px;
        max-width:calc(100% - 18px);
        padding:6px 8px;
        font-size:10px;
      }

      .imageInfo{
        padding:12px;
      }

      .imageInfo h2{
        font-size:24px;
        letter-spacing:-.055em;
        margin-bottom:6px;
      }

      .imageInfo p{
        font-size:12px;
        line-height:1.42;
      }

      .tags{
        margin-top:9px;
        gap:5px;
      }

      .tag{
        padding:5px 7px;
        font-size:10px;
      }

      .cardHead{
        padding:12px;
      }

      .cardHead h3{
        font-size:18px;
      }

      .cardHead p{
        display:none;
      }

      .cardBody{
        padding:12px;
      }

      .formGrid{
        grid-template-columns:1fr;
        gap:10px;
      }

      .formStep{
        margin:4px 0 -3px;
        font-size:11px;
      }

      .formStep span{
        width:22px;
        height:22px;
        font-size:10px;
      }

      .field{
        gap:5px;
      }

      .field label{
        font-size:11px;
      }

      .field input,
      .field select,
      .field textarea{
        min-height:40px;
        padding:10px 11px;
        border-radius:13px;
        font-size:13px;
      }

      .field textarea{
        min-height:86px;
      }

      .hint{
        font-size:10px;
      }

      .addonsGrid{
        grid-template-columns:1fr;
        gap:7px;
      }

      .addonChoice{
        padding:9px;
        border-radius:14px;
      }

      .addonChoice b{
        font-size:11px;
        margin-bottom:0;
      }

      .addonChoice span{
        display:none;
      }

      .sideStack{
        gap:10px;
      }

      .priceDetailsToggle{
        display:block;
      }

      .priceDetails{
        display:none;
      }

      .priceDetails.open{
        display:block;
      }

      .priceLine{
        font-size:12px;
        padding:8px 0;
      }

      .totalBox{
        margin-top:8px;
        padding:12px;
        border-radius:17px;
      }

      .totalBox b{
        font-size:28px;
      }

      .quoteNote{
        font-size:11px;
        padding:10px;
        border-radius:14px;
      }

      .priceCard .actionRow{
        display:none;
      }

      .policyNote{
        font-size:11px;
        padding:10px;
        border-radius:15px;
      }

      .footer{
        padding:16px 0 98px;
      }

      .footerLinks{
        justify-content:flex-start;
      }

      .mobileStickyBar{
        position:fixed;
        left:9px;
        right:9px;
        bottom:calc(10px + env(safe-area-inset-bottom));
        z-index:160;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        padding:10px;
        border-radius:22px;
        border:1px solid rgba(100,13,107,.18);
        background:rgba(255,255,255,.94);
        backdrop-filter:blur(18px);
        box-shadow:0 18px 42px rgba(100,13,107,.18);
      }

      .mobileStickyBar span{
        display:block;
        color:var(--muted);
        font-size:10px;
        font-weight:900;
        margin-bottom:2px;
      }

      .mobileStickyBar b{
        display:block;
        color:var(--purple);
        font-size:20px;

<script>
  const SUPABASE_URL = "https://rdpynngsjhzirxwzrxdd.supabase.co";
  const SUPABASE_KEY = "sb_publishable_oPaplUdywtmujaMjyyzHTQ_6fqthIzu";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const CART_KEY = "cakeShopCartV1";
  const CACHE_PREFIX = "siffatCakeCacheV4:";
  const CACHE_MAX_AGE_MS = 1000 * 60 * 60 * 12;
  const LOAD_TIMEOUT_MS = 9000;
  const LOAD_RETRY_DELAYS = [0, 900, 1800, 3500];

  const FALLBACK_IMAGE = "https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=1200&q=80";

  const DEFAULT_SETTINGS = {
    brand_name:"Siffat Cakes",
    tagline:"Eggless Cakes & Desserts",
    logo_url:"",
    whatsapp_number:"",
    instagram_url:"",
    address:"381 Talbot Street, St. Thomas",
    business_hours:"",
    service_area:"",
    minimum_notice_hours:24,
    same_day_message:"Online orders require at least 24 hours notice. For same-day or urgent orders, please contact us directly on WhatsApp.",
    policy_text:"Online orders require at least 24 hours notice. Your order is confirmed only after the shop replies on WhatsApp. Estimated prices may change after design review.",
    currency:"$",
    show_prices:true
  };

  let siteSettings = {...DEFAULT_SETTINGS};

  let currentCake = null;
  let isCustomCake = false;
  let pageCakeId = "";
  let lastLoadAt = 0;

  let categories = [];
  let sizes = [];
  let flavours = [];
  let options = [];
  let addons = [];

  let cakeCategories = [];
  let cakeSizes = [];
  let cakeFlavours = [];
  let cakeAddons = [];

  const $ = (id) => document.getElementById(id);

  document.addEventListener("DOMContentLoaded", () => {
    $("year").textContent = new Date().getFullYear();

    parsePageContext();
    updateCartCount();
    applyCachedCakeData();

    init().catch(err => {
      console.error("Cake page init failed:", err);
      showPageError(err.message || "Unknown cake page error");
    });
  });

  window.addEventListener("pageshow", () => {
    updateCartCount();

    if(Date.now() - lastLoadAt > 1000 * 60 * 5){
      init(true).catch(err => console.warn("Cake refresh failed:", err));
    }
  });

  document.addEventListener("visibilitychange", () => {
    if(!document.hidden){
      updateCartCount();

      if(Date.now() - lastLoadAt > 1000 * 60 * 5){
        init(true).catch(err => console.warn("Cake visibility refresh failed:", err));
      }
    }
  });

  function parsePageContext(){
    const params = new URLSearchParams(window.location.search);
    pageCakeId = params.get("id") || "";
    isCustomCake = params.get("custom") === "true" || params.get("type") === "custom";
  }

  async function init(silent = false){
    try{
      if(!silent){
        $("mainContent").innerHTML = `<div class="empty">Loading cake details...</div>`;
      }

      await loadDataWithRetry(pageCakeId);
      applySettings();

      if(!isCustomCake && !currentCake){
        showNotFound();
        return;
      }

      renderPage();
      updatePrice();
      saveCakeCache();

      lastLoadAt = Date.now();
    }catch(err){
      console.warn("Live cake load failed:", err?.message || err);

      applySettings();

      if(!isCustomCake && !currentCake){
        showPageError("Cake details could not load right now. Please refresh or check Supabase access.");
        return;
      }

      renderPage();
      updatePrice();
    }
  }

  async function loadDataWithRetry(cakeId){
    let lastErr = null;

    for(let attempt = 0; attempt < LOAD_RETRY_DELAYS.length; attempt++){
      const delay = LOAD_RETRY_DELAYS[attempt];

      if(delay){
        await wait(delay);
        if(attempt >= 2){
          showToast("Waking up website data...");
        }
      }

      try{
        await warmSupabase();
        await loadData(cakeId);
        return;
      }catch(err){
        lastErr = err;
        console.warn(`Cake page load attempt ${attempt + 1} failed:`, err?.message || err);
      }
    }

    throw lastErr || new Error("Cake page data failed to load.");
  }

  async function warmSupabase(){
    try{
      await withTimeout(
        supabaseClient.from("site_settings").select("id").eq("id", 1).maybeSingle(),
        LOAD_TIMEOUT_MS
      );
    }catch(err){
      console.warn("Supabase warm-up skipped:", err?.message || err);
    }
  }

  async function loadData(cakeId){
    const cakeQuery = cakeId && !isCustomCake
      ? supabaseClient.from("cakes").select("*").eq("id", cakeId).eq("is_active", true).maybeSingle()
      : Promise.resolve({ data:null, error:null });

    const requests = await Promise.allSettled([
      withTimeout(supabaseClient.from("site_settings").select("*").eq("id", 1).maybeSingle(), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("categories").select("*").eq("is_active", true).order("sort_order", { ascending:true }).order("name", { ascending:true }), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("sizes").select("*").eq("is_active", true).order("sort_order", { ascending:true }).order("name", { ascending:true }), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("flavours").select("*").eq("is_active", true).order("sort_order", { ascending:true }).order("name", { ascending:true }), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("cake_options").select("*").eq("is_active", true).order("sort_order", { ascending:true }).order("name", { ascending:true }), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("addons").select("*").eq("is_active", true).order("sort_order", { ascending:true }).order("name", { ascending:true }), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("cake_categories").select("*"), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("cake_sizes").select("*"), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("cake_flavours").select("*"), LOAD_TIMEOUT_MS),
      withTimeout(supabaseClient.from("cake_addons").select("*"), LOAD_TIMEOUT_MS),
      withTimeout(cakeQuery, LOAD_TIMEOUT_MS)
    ]);

    const [
      settingsRes,
      categoriesRes,
      sizesRes,
      flavoursRes,
      optionsRes,
      addonsRes,
      cakeCategoriesRes,
      cakeSizesRes,
      cakeFlavoursRes,
      cakeAddonsRes,
      cakeRes
    ] = requests.map(result => {
      if(result.status === "fulfilled") return result.value;
      return { data:null, error:result.reason || new Error("Request failed") };
    });

    reportSupabaseIssue("site_settings", settingsRes.error);
    reportSupabaseIssue("categories", categoriesRes.error);
    reportSupabaseIssue("sizes", sizesRes.error);
    reportSupabaseIssue("flavours", flavoursRes.error);
    reportSupabaseIssue("cake_options", optionsRes.error);
    reportSupabaseIssue("addons", addonsRes.error);
    reportSupabaseIssue("cake_categories", cakeCategoriesRes.error);
    reportSupabaseIssue("cake_sizes", cakeSizesRes.error);
    reportSupabaseIssue("cake_flavours", cakeFlavoursRes.error);
    reportSupabaseIssue("cake_addons", cakeAddonsRes.error);
    reportSupabaseIssue("cakes", cakeRes.error);

    if(!settingsRes.error && settingsRes.data){
      siteSettings = {...DEFAULT_SETTINGS, ...(settingsRes.data || {})};
    }

    if(!categoriesRes.error) categories = Array.isArray(categoriesRes.data) ? categoriesRes.data : [];
    if(!sizesRes.error) sizes = Array.isArray(sizesRes.data) ? sizesRes.data : [];
    if(!flavoursRes.error) flavours = Array.isArray(flavoursRes.data) ? flavoursRes.data : [];
    if(!optionsRes.error) options = Array.isArray(optionsRes.data) ? optionsRes.data : [];
    if(!addonsRes.error) addons = Array.isArray(addonsRes.data) ? addonsRes.data : [];

    if(!cakeCategoriesRes.error) cakeCategories = Array.isArray(cakeCategoriesRes.data) ? cakeCategoriesRes.data : [];
    if(!cakeSizesRes.error) cakeSizes = Array.isArray(cakeSizesRes.data) ? cakeSizesRes.data : [];
    if(!cakeFlavoursRes.error) cakeFlavours = Array.isArray(cakeFlavoursRes.data) ? cakeFlavoursRes.data : [];
    if(!cakeAddonsRes.error) cakeAddons = Array.isArray(cakeAddonsRes.data) ? cakeAddonsRes.data : [];

    if(!isCustomCake){
      currentCake = !cakeRes.error ? (cakeRes.data || null) : null;
    }else{
      currentCake = null;
    }

    if(!isCustomCake && cakeId && cakeRes.error){
      throw new Error("Cake could not load.");
    }

    if(settingsRes.error && categoriesRes.error && sizesRes.error && flavoursRes.error && addonsRes.error){
      throw new Error("All cake page Supabase requests failed.");
    }
  }

  function reportSupabaseIssue(label, error){
    if(error){
      console.warn(`[${label}]`, error.message || error);
    }
  }

  function applySettings(){
    const brand = siteSettings.brand_name || DEFAULT_SETTINGS.brand_name;
    const tagline = siteSettings.tagline || DEFAULT_SETTINGS.tagline;
    const logo = siteSettings.logo_url || "";
    const whatsapp = normalizePhone(siteSettings.whatsapp_number || "");

    $("siteBrandName").textContent = brand;
    $("siteTagline").textContent = tagline;
    $("footerBrand").textContent = brand;
    $("footerAddress").textContent = buildFooterInfo();

    if(logo){
      $("siteLogo").innerHTML = `<img src="${escapeHtml(cacheBustImage(logo))}" alt="${escapeHtml(brand)}" onerror="this.parentElement.textContent='🍰'">`;
    }else{
      $("siteLogo").textContent = "🍰";
    }

    setupWhatsappLinks(whatsapp);
  }

  function renderPage(){
    const cakeName = isCustomCake ? "Custom Cake Request" : (currentCake.name || "Custom Cake");

    const cakeDescription = isCustomCake
      ? "Create a custom cake from scratch. Add your design idea, size, flavour, message and special notes."
      : (currentCake.description || "Fresh custom cake made on order.");

    const cakeImage = isCustomCake ? FALLBACK_IMAGE : (currentCake.image_url || FALLBACK_IMAGE);
    const catNames = isCustomCake ? ["Custom Cake"] : getCakeCategoryNames(currentCake.id);

    document.title = `${cakeName} - ${siteSettings.brand_name || "Siffat Cakes"}`;

    $("mainContent").innerHTML = `
      <section class="imageCard">
        <div class="imageBox">
          <img id="cakeImagePreview" src="${escapeHtml(cacheBustImage(cakeImage))}" alt="${escapeHtml(cakeName)}" onerror="this.src='${FALLBACK_IMAGE}'">
          <div class="badge">${escapeHtml(catNames[0] || "Cake")}${!isCustomCake && currentCake.is_featured ? " · Featured" : ""}</div>
        </div>

        <div class="imageInfo">
          <h2>${escapeHtml(cakeName)}</h2>
          <p>${escapeHtml(cakeDescription)}</p>

          <div class="tags">
            ${catNames.slice(0,3).map(name => `<span class="tag">${escapeHtml(name)}</span>`).join("")}
            <span class="tag">${isCustomCake ? "custom request" : "customizable"}</span>
            <span class="tag">${isCustomCake ? "quote possible" : escapeHtml(currentCake.price_type || "estimated")}</span>
          </div>
        </div>
      </section>

      <section class="formCard">
        <div class="cardHead">
          <div>
            <h3>Customize Your Cake</h3>
            <p>Select size, flavour, option, add-ons and notes. Estimated price updates live.</p>
          </div>
        </div>

        <div class="cardBody">
          <form id="customForm" class="formGrid">
            ${isCustomCake ? `
              <div class="formStep"><span>1</span> Cake idea</div>

              <div class="field full">
                <label>What cake do you want? *</label>
                <input id="customCakeTitle" required placeholder="Birthday cake, princess cake, engagement cake...">
              </div>
            ` : ""}

            <div class="formStep"><span>${isCustomCake ? "2" : "1"}</span> Size and flavour</div>

            <div class="field">
              <label>Cake Size *</label>
              <select id="sizeSelect" required onchange="updatePrice()">
                ${buildSizeOptions()}
              </select>
              <div class="hint">Servings and base price are controlled by admin.</div>
            </div>

            <div class="field">
              <label>Flavour</label>
              <select id="flavourSelect" onchange="updatePrice()">
                ${buildFlavourOptions()}
              </select>
            </div>

            <div class="formStep"><span>${isCustomCake ? "3" : "2"}</span> Options</div>

            <div class="field">
              <label>Option</label>
              <select id="optionSelect" onchange="updatePrice()">
                ${buildOptionOptions()}
              </select>
            </div>

            <div class="field">
              <label>Quantity</label>
              <input id="quantityInput" type="number" min="1" value="1" oninput="updatePrice()">
            </div>

            <div class="formStep"><span>${isCustomCake ? "4" : "3"}</span> Message and notes</div>

            <div class="field full">
              <label>Message on Cake</label>
              <input id="cakeMessageInput" placeholder="Happy Birthday, Congratulations, Baby Shower, etc.">
            </div>

            <div class="field full">
              <label>Design / colour / allergy notes</label>
              <textarea id="notesInput" placeholder="Theme, colours, allergy info, inspiration photo link, pickup notes, budget range, or anything special here."></textarea>
              <div class="hint">Use this box for design/theme/colour/photo link/allergy details.</div>
            </div>

            <div class="formStep"><span>${isCustomCake ? "5" : "4"}</span> Add-ons</div>

            <div class="field full">
              <label>Add-ons</label>
              <div id="addonsGrid" class="addonsGrid">
                ${buildAddonChoices()}
              </div>
              <div class="hint">Quote-required add-ons may change final price after shop review.</div>
            </div>
          </form>
        </div>
      </section>

      <aside class="sideStack">
        <div class="priceCard">
          <div class="cardHead">
            <div>
              <h3>Estimated Price</h3>
              <p>This is not final confirmation. Shop will review and confirm on WhatsApp.</p>
            </div>
          </div>

          <div class="cardBody">
            <button class="priceDetailsToggle" type="button" onclick="togglePriceDetails()">View price details</button>

            <div id="priceDetails" class="priceDetails">
              <div id="priceBreakdown"></div>
            </div>

            <div class="totalBox">
              <span>Estimated Item Total</span>
              <b id="estimatedTotal">$0</b>
            </div>

            <div id="quoteNote" class="quoteNote">
              Some selected options require a custom quote. Final price will be confirmed by the shop.
            </div>

            <div class="actionRow">
              <button class="addBtn" type="button" onclick="addToCart(false)">Add to Cart</button>
              <button class="secondaryBtn" type="button" onclick="addToCart(true)">Add & Go to Cart</button>
            </div>
          </div>
        </div>

        <div class="infoCard">
          <div class="cardBody">
            <div class="policyNote">
              ${escapeHtml(siteSettings.policy_text || DEFAULT_SETTINGS.policy_text)}
              <br><br>
              ${escapeHtml(siteSettings.same_day_message || DEFAULT_SETTINGS.same_day_message)}
            </div>

            <div class="actionRow">
              <a class="secondaryBtn" id="sideWhatsappBtn" href="#" target="_blank" rel="noopener">Need Today? WhatsApp</a>
              <a class="secondaryBtn" href="category.html?cat=cakes">Back to Cakes</a>
            </div>
          </div>
        </div>
      </aside>
    `;

    setupSideWhatsapp();
  }

  function buildSizeOptions(){
    const availableSizes = getAvailableSizes();

    if(!availableSizes.length){
      return `<option value="">No sizes available</option>`;
    }

    return `
      <option value="">Select size</option>
      ${availableSizes.map(size => {
        const price = Number(size.price || 0);
        const priceText = size.quote_required ? "Quote required" : money(price);
        const label = `${size.name}${size.servings ? " — " + size.servings : ""} — ${priceText}`;
        return `<option value="${escapeHtml(size.id)}">${escapeHtml(label)}</option>`;
      }).join("")}
    `;
  }

  function buildFlavourOptions(){
    const availableFlavours = getAvailableFlavours();

    if(!availableFlavours.length){
      return `<option value="">No flavours available</option>`;
    }

    return `
      <option value="">Select flavour</option>
      ${availableFlavours.map(flavour => {
        const extra = Number(flavour.extra_price || 0);
        const priceText = flavour.quote_required ? "Quote required" : (extra ? "+" + money(extra) : "+$0");
        return `<option value="${escapeHtml(flavour.id)}">${escapeHtml(flavour.name + " — " + priceText)}</option>`;
      }).join("")}
      <option value="not_sure">Not sure / Need suggestion</option>
    `;
  }

  function buildOptionOptions(){
    if(!options.length){
      return `<option value="">No options available</option>`;
    }

    return `
      <option value="">Select option</option>
      ${options.map(option => {
        const extra = Number(option.extra_price || 0);
        const priceText = option.quote_required ? "Quote required" : (extra ? "+" + money(extra) : "+$0");
        return `<option value="${escapeHtml(option.id)}">${escapeHtml(option.name + " — " + priceText)}</option>`;
      }).join("")}
    `;
  }

  function buildAddonChoices(){
    const availableAddons = getAvailableAddons();

    if(!availableAddons.length){
      return `<div class="hint">No add-ons available.</div>`;
    }

    return availableAddons.map(addon => {
      const price = Number(addon.price || 0);
      const priceText = addon.quote_required ? "Quote required" : (price ? "+" + money(price) : "+$0");

      return `
        <label class="addonChoice">
          <input type="checkbox" value="${escapeHtml(addon.id)}" onchange="updatePrice()">
          <div>
            <b>${escapeHtml(addon.name)} · ${escapeHtml(priceText)}</b>
            <span>${escapeHtml(addon.description || "Optional add-on")}</span>
          </div>
        </label>
      `;
    }).join("");
  }

  function getAvailableSizes(){
    if(isCustomCake) return sizes;

    const ids = cakeSizes
      .filter(row => String(row.cake_id) === String(currentCake.id))
      .map(row => String(row.size_id));

    if(!ids.length) return sizes;

    return sizes.filter(size => ids.includes(String(size.id)));
  }

  function getAvailableFlavours(){
    if(isCustomCake) return flavours;

    const ids = cakeFlavours
      .filter(row => String(row.cake_id) === String(currentCake.id))
      .map(row => String(row.flavour_id));

    if(!ids.length) return flavours;

    return flavours.filter(flavour => ids.includes(String(flavour.id)));
  }

  function getAvailableAddons(){
    if(isCustomCake) return addons;

    const ids = cakeAddons
      .filter(row => String(row.cake_id) === String(currentCake.id))
      .map(row => String(row.addon_id));

    if(!ids.length) return addons;

    return addons.filter(addon => ids.includes(String(addon.id)));
  }

  function updatePrice(){
    const selectedSize = getSelectedSize();
    const selectedFlavour = getSelectedFlavour();
    const selectedOption = getSelectedOption();
    const selectedAddons = getSelectedAddons();
    const quantity = Math.max(1, Number($("quantityInput")?.value || 1));

    const sizePrice = selectedSize ? Number(selectedSize.price || 0) : 0;
    const flavourExtra = selectedFlavour ? Number(selectedFlavour.extra_price || 0) : 0;
    const optionExtra = selectedOption ? Number(selectedOption.extra_price || 0) : 0;
    const addonTotal = selectedAddons.reduce((sum, addon) => sum + Number(addon.price || 0), 0);

    const unitTotal = sizePrice + flavourExtra + optionExtra + addonTotal;
    const estimatedTotal = unitTotal * quantity;

    const quoteRequired =
      siteSettings.show_prices === false ||
      !selectedSize ||
      selectedSize?.quote_required === true ||
      selectedFlavour?.quote_required === true ||
      selectedOption?.quote_required === true ||
      selectedAddons.some(addon => addon.quote_required === true);

    const rows = [];

    rows.push({
      label: selectedSize
        ? `${selectedSize.name}${selectedSize.servings ? " · " + selectedSize.servings : ""}`
        : "Cake size",
      value: selectedSize ? (selectedSize.quote_required ? "Quote" : money(sizePrice)) : "Select"
    });

    rows.push({
      label: getFlavourLabel(),
      value: selectedFlavour ? (selectedFlavour.quote_required ? "Quote" : "+" + money(flavourExtra)) : "Not priced"
    });

    rows.push({
      label: selectedOption ? selectedOption.name : "Option",
      value: selectedOption ? (selectedOption.quote_required ? "Quote" : "+" + money(optionExtra)) : "Not selected"
    });

    if(selectedAddons.length){
      selectedAddons.forEach(addon => {
        rows.push({
          label:addon.name,
          value:addon.quote_required ? "Quote" : "+" + money(addon.price)
        });
      });
    }else{
      rows.push({
        label:"Add-ons",
        value:"None"
      });
    }

    rows.push({
      label:"Quantity",
      value:"× " + quantity
    });

    const priceBreakdown = $("priceBreakdown");
    if(priceBreakdown){
      priceBreakdown.innerHTML = rows.map(row => `
        <div class="priceLine">
          <span>${escapeHtml(row.label)}</span>
          <b>${escapeHtml(row.value)}</b>
        </div>
      `).join("");
    }

    const totalText = quoteRequired ? "Quote" : money(estimatedTotal);

    if($("estimatedTotal")) $("estimatedTotal").textContent = totalText;
    if($("mobileStickyTotal")) $("mobileStickyTotal").textContent = totalText;
    if($("quoteNote")) $("quoteNote").classList.toggle("show", quoteRequired);

    return {
      selectedSize,
      selectedFlavour,
      selectedOption,
      selectedAddons,
      quantity,
      sizePrice,
      flavourExtra,
      optionExtra,
      addonTotal,
      estimatedTotal,
      quoteRequired
    };
  }

  function togglePriceDetails(){
    const details = $("priceDetails");
    if(!details) return;

    details.classList.toggle("open");

    const btn = document.querySelector(".priceDetailsToggle");
    if(btn){
      btn.textContent = details.classList.contains("open") ? "Hide price details" : "View price details";
    }
  }

  function addToCart(goToCart = false){
    const priceData = updatePrice();

    if(!priceData.selectedSize){
      showToast("Please select cake size first.", true);
      return;
    }

    const customTitleInput = $("customCakeTitle");

    const cakeName = isCustomCake
      ? (customTitleInput?.value.trim() || "")
      : (currentCake.name || "Cake");

    if(isCustomCake && !cakeName){
      showToast("Please enter what cake you want.", true);
      customTitleInput?.focus();
      return;
    }

    const cart = getCart();

    const flavourName = getFlavourLabel();
    const image = isCustomCake ? FALLBACK_IMAGE : (currentCake.image_url || FALLBACK_IMAGE);

    const item = {
      cart_item_id:createId(),
      cart_id:createId(),
      cartId:createId(),

      item_type:"custom_cake",
      product_type:"custom_cake",
      type:"cake",
      kind:"cake",

      cake_id:isCustomCake ? null : currentCake.id,
      product_id:isCustomCake ? null : currentCake.id,
      cake_name:cakeName,
      name:cakeName,
      cake_image:image,
      image_url:image,
      is_custom:isCustomCake,

      selected_size_id:priceData.selectedSize?.id || "",
      selected_size_name:priceData.selectedSize?.name || "",
      size_name:priceData.selectedSize?.name || "",
      selected_servings:priceData.selectedSize?.servings || "",
      servings:priceData.selectedSize?.servings || "",
      selected_size_price:Number(priceData.sizePrice || 0),
      size_price:Number(priceData.sizePrice || 0),
      size_quote_required:priceData.selectedSize?.quote_required === true,

      selected_flavour_id:priceData.selectedFlavour?.id || "",
      selected_flavour_name:flavourName === "Flavour" ? "" : flavourName,
      flavour_name:flavourName === "Flavour" ? "" : flavourName,
      flavour:flavourName === "Flavour" ? "" : flavourName,
      flavour_extra_price:Number(priceData.flavourExtra || 0),
      flavour_quote_required:priceData.selectedFlavour?.quote_required === true,

      selected_option_id:priceData.selectedOption?.id || "",
      selected_option_name:priceData.selectedOption?.name || "",
      option_name:priceData.selectedOption?.name || "",
      option_extra_price:Number(priceData.optionExtra || 0),
      option_quote_required:priceData.selectedOption?.quote_required === true,

      selected_addons:priceData.selectedAddons.map(addon => ({
        id:addon.id,
        name:addon.name,
        price:Number(addon.price || 0),
        quote_required:addon.quote_required === true
      })),

      addons_json:priceData.selectedAddons.map(addon => ({
        id:addon.id,
        name:addon.name,
        price:Number(addon.price || 0),
        quote_required:addon.quote_required === true
      })),

      message_on_cake:$("cakeMessageInput").value.trim(),
      theme_notes:"",
      inspiration_photo_link:"",
      special_notes:$("notesInput").value.trim(),

      quantity:priceData.quantity,
      estimated_item_total:Number(priceData.estimatedTotal || 0),
      estimated_total:Number(priceData.estimatedTotal || 0),
      price_type:priceData.quoteRequired ? "quote" : "estimated",
      quote_required:priceData.quoteRequired === true,
      added_at:new Date().toISOString()
    };

    cart.push(item);
    saveCart(cart);
    updateCartCount();

    showToast("Cake added to cart.");

    if(goToCart){
      window.location.href = "cart.html";
    }
  }

  function getSelectedSize(){
    const value = $("sizeSelect")?.value || "";
    return sizes.find(size => String(size.id) === String(value)) || null;
  }

  function getSelectedFlavour(){
    const value = $("flavourSelect")?.value || "";

    if(!value || value === "not_sure"){
      return null;
    }

    return flavours.find(flavour => String(flavour.id) === String(value)) || null;
  }

  function getFlavourLabel(){
    const value = $("flavourSelect")?.value || "";

    if(value === "not_sure"){
      return "Not sure / Need suggestion";
    }

    const selected = getSelectedFlavour();

    if(selected) return selected.name;

    return "Flavour";
  }

  function getSelectedOption(){
    const value = $("optionSelect")?.value || "";
    return options.find(option => String(option.id) === String(value)) || null;
  }

  function getSelectedAddons(){
    const checked = Array.from(document.querySelectorAll("#addonsGrid input[type='checkbox']:checked")).map(input => input.value);
    return addons.filter(addon => checked.includes(String(addon.id)));
  }

  function getCakeCategoryNames(cakeId){
    const ids = cakeCategories
      .filter(row => String(row.cake_id) === String(cakeId))
      .map(row => row.category_id);

    return ids
      .map(id => categories.find(cat => String(cat.id) === String(id))?.name)
      .filter(Boolean);
  }

  function showNotFound(){
    $("mainContent").innerHTML = `
      <div class="empty">
        <strong>Cake not found.</strong><br>
        This cake does not exist or is currently inactive.<br><br>
        <a class="primaryBtn" href="category.html?cat=cakes">View Cakes</a>
      </div>
    `;
  }

  function showPageError(message){
    $("mainContent").innerHTML = `
      <div class="empty">
        <strong>Page error</strong><br>
        ${escapeHtml(message)}<br><br>
        Please refresh the page.
      </div>
    `;
  }

  function setupWhatsappLinks(phone){
    const normalMessage = "Hi, I want to ask about a cake or dessert order.";
    const normalUrl = phone ? `https://wa.me/${phone}?text=${encodeURIComponent(normalMessage)}` : "#";

    const top = $("topWhatsappBtn");
    if(!top) return;

    top.href = normalUrl;
    top.onclick = phone ? null : function(e){
      e.preventDefault();
      showToast("WhatsApp number is not added yet.", true);
    };
  }

  function setupSideWhatsapp(){
    const sideWhatsapp = $("sideWhatsappBtn");
    if(!sideWhatsapp) return;

    const phone = normalizePhone(siteSettings.whatsapp_number || "");

    if(phone){
      sideWhatsapp.href = `https://wa.me/${phone}?text=${encodeURIComponent("Hi, I need a same-day or urgent cake order. Can you please confirm availability?")}`;
      sideWhatsapp.onclick = null;
    }else{
      sideWhatsapp.href = "#";
      sideWhatsapp.onclick = function(e){
        e.preventDefault();
        showToast("WhatsApp number is not added yet.", true);
      };
    }
  }

  function buildFooterInfo(){
    const parts = [];

    if(siteSettings.address) parts.push(siteSettings.address);
    if(siteSettings.service_area) parts.push("Serving " + siteSettings.service_area);
    if(siteSettings.business_hours) parts.push(siteSettings.business_hours);

    return parts.length ? parts.join(" · ") : "381 Talbot Street, St. Thomas";
  }

  function getCart(){
    try{
      const raw = localStorage.getItem(CART_KEY);
      const parsed = JSON.parse(raw || "[]");
      return Array.isArray(parsed) ? parsed : [];
    }catch{
      return [];
    }
  }

  function saveCart(cart){
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  function updateCartCount(){
    const cart = getCart();
    const count = cart.reduce((sum,item) => sum + Number(item.quantity || 1), 0);
    $("cartCount").textContent = count;
  }

  function applyCachedCakeData(){
    try{
      const raw = localStorage.getItem(getCacheKey());
      if(!raw) return;

      const cached = JSON.parse(raw);
      if(!cached || Date.now() - Number(cached.savedAt || 0) > CACHE_MAX_AGE_MS) return;

      if(cached.isCustomCake !== isCustomCake) return;
      if(String(cached.pageCakeId || "") !== String(pageCakeId || "")) return;

      siteSettings = {...DEFAULT_SETTINGS, ...(cached.siteSettings || {})};
      categories = Array.isArray(cached.categories) ? cached.categories : [];
      sizes = Array.isArray(cached.sizes) ? cached.sizes : [];
      flavours = Array.isArray(cached.flavours) ? cached.flavours : [];
      options = Array.isArray(cached.options) ? cached.options : [];
      addons = Array.isArray(cached.addons) ? cached.addons : [];
      cakeCategories = Array.isArray(cached.cakeCategories) ? cached.cakeCategories : [];
      cakeSizes = Array.isArray(cached.cakeSizes) ? cached.cakeSizes : [];
      cakeFlavours = Array.isArray(cached.cakeFlavours) ? cached.cakeFlavours : [];
      cakeAddons = Array.isArray(cached.cakeAddons) ? cached.cakeAddons : [];
      currentCake = cached.currentCake || null;

      applySettings();

      if(!isCustomCake && !currentCake) return;

      renderPage();
      updatePrice();
    }catch(err){
      console.warn("Could not apply cake page cache:", err);
    }
  }

  function saveCakeCache(){
    try{
      localStorage.setItem(getCacheKey(), JSON.stringify({
        savedAt:Date.now(),
        pageCakeId,
        isCustomCake,
        siteSettings,
        currentCake,
        categories,
        sizes,
        flavours,
        options,
        addons,
        cakeCategories,
        cakeSizes,
        cakeFlavours,
        cakeAddons
      }));
    }catch(err){
      console.warn("Could not save cake page cache:", err);
    }
  }

  function getCacheKey(){
    return CACHE_PREFIX + (isCustomCake ? "custom" : (pageCakeId || "missing"));
  }

  function money(value){
    const symbol = siteSettings.currency || "$";
    const num = Number(value || 0);
    return symbol + num.toFixed(2).replace(".00","");
  }

  function createId(){
    if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "cart-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }

  function toggleMobileMenu(){
    $("mobileMenu").classList.toggle("show");
  }

  function normalizePhone(value){
    return String(value || "").replace(/[^\d]/g, "");
  }

  function showToast(message, isError = false){
    const toast = $("toast");
    toast.textContent = message;
    toast.style.background = isError ? "var(--red)" : "var(--purple)";
    toast.classList.add("show");

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => {
      toast.classList.remove("show");
    }, 2400);
  }

  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("Request timed out. Retrying.")), ms))
    ]);
  }

  function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function cacheBustImage(url){
    const clean = String(url || "");
    if(!clean) return clean;
    if(!clean.includes("supabase.co/storage")) return clean;

    const sep = clean.includes("?") ? "&" : "?";
    return `${clean}${sep}v=${Date.now()}`;
  }

  function escapeHtml(value){
    return String(value ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
</script>

</body>
